<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype Textures</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #141414;
    --surface: #1e1e1e;
    --surface2: #282828;
    --border: #2e2e2e;
    --text: #d8d8d8;
    --muted: #666;
    --accent: #f0e060;
    --font: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-grid {
    display: grid;
    grid-template-columns: repeat(5, 6px);
    grid-template-rows: repeat(5, 6px);
    gap: 2px;
  }
  .logo-grid span {
    border-radius: 1px;
    opacity: 0.9;
  }

  h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.2;
  }
  h1 small {
    display: block;
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .badge {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .btn {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: #141414;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.8; }

  /* ── SIDEBAR + MAIN LAYOUT ── */
  .layout {
    display: flex;
    min-height: calc(100vh - 61px);
  }

  aside {
    width: 200px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 61px;
    height: calc(100vh - 61px);
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 24px;
  }

  .sidebar-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px;
    margin-bottom: 8px;
  }

  .color-tab {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    padding: 7px 20px;
    font-family: var(--font);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.5px;
    transition: color 0.1s, background 0.1s;
    border-left: 2px solid transparent;
  }
  .color-tab::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: var(--swatch, var(--border));
    flex-shrink: 0;
  }
  .color-tab:hover { color: var(--text); background: var(--surface); }
  .color-tab.active { color: var(--text); background: var(--surface); border-left-color: var(--swatch, var(--text)); }

  .color-tab-all {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    padding: 7px 20px;
    font-family: var(--font);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.5px;
    transition: color 0.1s, background 0.1s;
    border-left: 2px solid transparent;
    margin-bottom: 4px;
  }
  .color-tab-all:hover { color: var(--text); background: var(--surface); }
  .color-tab-all.active { color: var(--text); border-left-color: var(--text); background: var(--surface); }

  .pattern-filter {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    padding: 6px 20px;
    font-family: var(--font);
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    text-align: left;
    transition: color 0.1s;
    border-left: 2px solid transparent;
  }
  .pattern-filter:hover { color: var(--text); }
  .pattern-filter.active { color: var(--text); border-left-color: var(--accent); }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    padding: 32px;
    overflow: hidden;
  }

  .group-header {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    margin-top: 36px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-header:first-of-type { margin-top: 0; }
  .group-count { color: var(--border); }

  .texture-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 4px;
  }

  .texture-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
    width: 128px;
    cursor: pointer;
    transition: border-color 0.12s, transform 0.12s, box-shadow 0.12s;
  }
  .texture-card:hover {
    border-color: #555;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }

  .texture-preview {
    width: 128px;
    height: 128px;
    display: block;
    image-rendering: pixelated;
  }

  .texture-footer {
    padding: 6px 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
  }
  .texture-name {
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.3px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dl-btn {
    font-family: var(--font);
    font-size: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 2px 5px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.1s;
    opacity: 0;
  }
  .texture-card:hover .dl-btn { opacity: 1; }
  .dl-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 18px;
    border-radius: 4px;
    font-size: 11px;
    transition: transform 0.2s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  canvas { display: none; }

  /* scrollbar */
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

const groups = [["checker", "Checker / Grid"], ["brick", "Brick / Tile"], ["stripes_diagonal", "Stripes \u2014 Diagonal"], ["stripes_horizontal", "Stripes \u2014 Horizontal"], ["dots", "Dots"], ["cross", "Cross / Plus"], ["diamond", "Diamond"], ["hex", "Hexagon Grid"], ["zigzag", "Zigzag"], ["triangles", "Triangle Grid"], ["arrow_right", "Arrow \u2192 Right"], ["arrow_left", "Arrow \u2190 Left"], ["arrow_up", "Arrow \u2191 Up"], ["arrow_down", "Arrow \u2193 Down"], ["solid", "Solid + Label"]];

let activeColor = "all";
let activePattern = "all";

// Build pattern filter buttons
const patternSidebar = document.querySelector('.sidebar-section:last-child');
groups.forEach(([type, label]) => {
  const btn = document.createElement("button");
  btn.className = "pattern-filter";
  btn.dataset.pattern = type;
  btn.textContent = label;
  btn.onclick = () => filterPattern(type, btn);
  patternSidebar.appendChild(btn);
});

// Animated logo grid
const logoGrid = document.getElementById("logoGrid");
const logoColors = ["#c8c8c8","#7ec8e3","#8dc26f","#e8a848","#e87070","#b07ec8","#f0e060","#60d8d0","#c8a070","#f0a0c0"];
for (let i = 0; i < 25; i++) {
  const s = document.createElement("span");
  s.style.background = logoColors[Math.floor(Math.random()*logoColors.length)];
  s.style.opacity = (0.4 + Math.random()*0.6).toFixed(2);
  logoGrid.appendChild(s);
}

function renderGallery() {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";
  let total = 0;

  groups.forEach(([type, label]) => {
    if (activePattern !== "all" && activePattern !== type) return;
    const matching = textures.filter(t => {
      const matchType = t.name.startsWith(type + "_");
      const matchColor = activeColor === "all" || t.name.endsWith("_" + activeColor);
      return matchType && matchColor;
    });
    if (!matching.length) return;
    total += matching.length;

    const heading = document.createElement("div");
    heading.className = "group-header";
    heading.innerHTML = `<span>${label}</span><span class="group-count">${matching.length}</span>`;
    gallery.appendChild(heading);

    const grid = document.createElement("div");
    grid.className = "texture-grid";

    matching.forEach(t => {
      const card = document.createElement("div");
      card.className = "texture-card";
      const dataUri = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(t.svg)));
      card.innerHTML = `
        <img class="texture-preview" src="${dataUri}" alt="${t.name}" loading="lazy"/>
        <div class="texture-footer">
          <span class="texture-name">${t.name}</span>
          <button class="dl-btn" onclick="downloadSVG('${t.name}',event)">SVG</button>
          <button class="dl-btn" onclick="downloadPNG('${t.name}',event)">PNG</button>
        </div>`;
      grid.appendChild(card);
    });
    gallery.appendChild(grid);
  });

  document.getElementById("countBadge").textContent = total + " textures";
}

function filterColor(color, btn) {
  activeColor = color;
  document.querySelectorAll(".color-tab,.color-tab-all").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderGallery();
}

function filterPattern(pattern, btn) {
  activePattern = pattern;
  document.querySelectorAll(".pattern-filter").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderGallery();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function svgToPNG(svgStr, callback) {
  const cvs = document.getElementById("cvs");
  const ctx = cvs.getContext("2d");
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,128,128); ctx.drawImage(img,0,0); callback(cvs.toDataURL("image/png")); };
  img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgStr)));
}

function downloadSVG(name, e) {
  e && e.stopPropagation();
  const t = textures.find(x => x.name === name);
  if (!t) return;
  const blob = new Blob([t.svg], {type:"image/svg+xml"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=name+".svg"; a.click();
  URL.revokeObjectURL(url);
  showToast("↓ " + name + ".svg");
}

function downloadPNG(name, e) {
  e && e.stopPropagation();
  const t = textures.find(x => x.name === name);
  if (!t) return;
  svgToPNG(t.svg, dataUrl => {
    const a = document.createElement("a"); a.href=dataUrl; a.download=name+".png"; a.click();
    showToast("↓ " + name + ".png");
  });
}

async function downloadAll() {
  const visible = textures.filter(t => {
    const type = groups.find(([g]) => t.name.startsWith(g+"_"));
    if (!type) return false;
    const matchColor = activeColor === "all" || t.name.endsWith("_"+activeColor);
    const matchPat = activePattern === "all" || t.name.startsWith(activePattern+"_");
    return matchColor && matchPat;
  });
  for (let t of visible) {
    const blob = new Blob([t.svg], {type:"image/svg+xml"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=t.name+".svg"; a.click();
    URL.revokeObjectURL(url);
    await new Promise(r => setTimeout(r, 60));
  }
  showToast("↓ Downloaded " + visible.length + " SVGs");
}

renderGallery();
</script>
